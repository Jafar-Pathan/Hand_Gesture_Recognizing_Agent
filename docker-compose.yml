version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gesture_postgres
    environment:
      POSTGRES_DB: gesture_recognition
      POSTGRES_USER: gesture_user
      POSTGRES_PASSWORD: gesture_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gesture_user -d gesture_recognition"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gesture-net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: gesture_backend
    environment:
      DATABASE_URL: postgresql://gesture_user:gesture_pass@postgres:5432/gesture_recognition
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      INFERENCE_MODE: image
      MODEL_PATH: models/best_model.keras
      CLASS_NAMES_PATH: models/class_names.json
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./dataset:/app/dataset
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gesture-net
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: gesture_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gesture-net
    restart: unless-stopped

  # ── pgAdmin (dev only) ───────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gesture_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gesture.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - gesture-net
    profiles:
      - dev  # only starts with: docker compose --profile dev up

volumes:
  postgres_data:

networks:
  gesture-net:
    driver: bridge
