##############################################################################
# Hand Gesture Recognition — Render Blueprint
# Deploy:  Connect repo on Render → Blueprint auto-detected
##############################################################################

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: gesture-recognition-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gesture-recognition-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://gesture-recognition-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health

  # ── React Frontend (Static Site) ────────────────────────────────────────
  - type: web
    name: gesture-recognition-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Managed PostgreSQL ───────────────────────────────────────────────────────
databases:
  - name: gesture-recognition-db
    plan: free
    databaseName: gesture_recognition
